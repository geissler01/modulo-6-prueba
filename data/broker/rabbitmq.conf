# =========================================================================
# SOLUCIÓN DE COMPATIBILIDAD ENTRE RABBITMQ 4.x Y CELERY (AIRFLOW WORKERS)
# =========================================================================
# ¿Por qué hacemos esto?:
# En su versión 4.x, RabbitMQ deshabilitó por defecto el uso de un tipo de colas 
# llamadas "transient_nonexcl_queues" porque las consideran obsoletas. 
# El problema es que Celery (la librería que usan los Workers de Airflow para 
# conectarse) todavía depende estrictamente de este tipo de colas para arrancar.
# Si no lo habilitamos explícitamente aquí, los workers mueren al instante.
#
# La alternativa:
# Si en algún momento no queremos depender de esta configuración forzada, la
# alternativa directa es bajar la versión de RabbitMQ en el docker-compose.yml 
# a la versión 3.x (por ejemplo: rabbitmq:3-management-alpine), la cual permite 
# estas colas de forma nativa sin quejarse.
# =========================================================================

deprecated_features.permit.transient_nonexcl_queues = true
